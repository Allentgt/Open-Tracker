name: Build APK

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clean Gradle caches
        run: |
          # Completely clean Gradle user home to fix corrupted instrumentation agent
          rm -rf "$HOME/.gradle/caches/"
          rm -rf "$HOME/.gradle/daemon/"
          rm -rf "$HOME/.gradle/wrapper/"
          rm -rf "$HOME/.gradle-user-home/"

      - name: Build Debug APK
        run: |
          # Use fresh Gradle user home to avoid stale state
          export GRADLE_USER_HOME="$HOME/.gradle-user-home"
          mkdir -p "$GRADLE_USER_HOME"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --no-build-cache --no-parallel --no-configuration-cache
        env:
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
